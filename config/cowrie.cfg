[ssh]
enabled = true
listen_endpoints = tcp:22:interface=0.0.0.0

[telnet]
enabled = true
listen_endpoints = tcp:23:interface=0.0.0.0

[output_jsonlog]
enabled = true

[output_postgresql]
enabled = true
host = 127.0.0.1
port = 5432
database = cowrie
username = cowrie
password = strongpassword
log_path = var/lib/cowrie
sslmode = disable

