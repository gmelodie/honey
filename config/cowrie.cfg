[honeypot]
sensor_name = cowrie
# Do not store attacker-uploaded files — avoids unbounded disk growth from malware samples.
download_limit_size = 0

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[output_jsonlog]
enabled = true

[output_postgresql]
enabled = true
host = ${POSTGRES_HOST}
port = ${POSTGRES_PORT}
database = ${POSTGRES_DB}
username = ${POSTGRES_USER}
password = ${POSTGRES_PASSWORD}

