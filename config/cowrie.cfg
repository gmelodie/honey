[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

[output_jsonlog]
enabled = true

[output_postgresql]
enabled = true
host = ${POSTGRES_HOST}
port = ${POSTGRES_PORT}
database = ${POSTGRES_DB}
username = ${POSTGRES_USER}
password = ${POSTGRES_PASSWORD}
log_path = var/lib/cowrie
sslmode = disable

