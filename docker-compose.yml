services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/docker-entrypoint-custom.sh"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/entrypoint.sh:/docker-entrypoint-custom.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} psql -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' -q -t"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["psql"]
    command: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} -f /schema.sql"
    volumes:
      - ./postgres/schema.sql:/schema.sql:ro
    restart: "no"

  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    # Grafana listens on port 47321 (set via GF_SERVER_HTTP_PORT)
    env_file: .env
    environment:
      - GF_SERVER_HTTP_PORT=47321
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_WAL=true
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=7d
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=30d
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  cowrie:
    build: ./cowrie
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    env_file: .env
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    volumes:
      - ./config/cowrie.cfg:/tmp/cowrie.cfg.template:ro
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/var/lib/cowrie:/cowrie/cowrie-git/var/lib/cowrie

  # Web honeypot — fake router admin panel served to unknown HTTP/HTTPS clients
  honeypot-web:
    build: ./honeypot-web
    container_name: honeypot-web
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./honeypot-web/logs:/var/log

  # Stats dashboard — cowrie attack data from PostgreSQL, behind reCAPTCHA
  web:
    build: ./web
    container_name: web
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-127.0.0.1}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx — routes port 80/443 by Host header
  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - TARGET_HOST=${TARGET_HOST}
    volumes:
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - honeypot-web

  # Certbot — automatic certificate renewal (runs every 12 h)
  certbot:
    image: certbot/certbot
    network_mode: host
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

  wordlists:
    image: python:3.12-slim
    container_name: wordlists
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - POSTGRES_HOST=127.0.0.1
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - WORDLIST_DIR=/wordlists
    volumes:
      - ./scripts/generate-wordlists.py:/usr/local/bin/generate-wordlists.py:ro
      - ./wordlists:/wordlists
    # Run once at startup, then every day at 03:00 UTC via cron
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq cron
        pip install psycopg2-binary -q
        python /usr/local/bin/generate-wordlists.py
        echo "0 3 * * * python /usr/local/bin/generate-wordlists.py >> /var/log/wordlists.log 2>&1" | crontab -
        cron -f

volumes:
  postgres-data:
  grafana-data:
