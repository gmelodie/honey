services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/docker-entrypoint-custom.sh"]
    volumes:
      - /mnt/postgres:/var/lib/postgresql/data
      - ./postgres/entrypoint.sh:/docker-entrypoint-custom.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} psql -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' -q -t"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["psql"]
    command: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} -f /schema.sql"
    volumes:
      - ./postgres/schema.sql:/schema.sql:ro
    restart: "no"

  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    # Grafana listens on port 47321 (set via GF_SERVER_HTTP_PORT)
    env_file: .env
    environment:
      - GF_SERVER_HTTP_PORT=47321
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_WAL=true
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=7d
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=30d
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    env_file: .env
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    entrypoint: ["/cowrie/cowrie-env/bin/python3", "-c", "import subprocess,os,sys,re; subprocess.run([sys.executable,'-m','pip','install','psycopg2-binary','-q']); t=open('/tmp/cowrie.cfg.template').read(); c=re.sub(r'\\$\\{(\\w+)\\}',lambda m:os.environ.get(m.group(1),m.group(0)),t); open('/cowrie/cowrie-git/etc/cowrie.cfg','w').write(c); os.execv('/cowrie/cowrie-env/bin/twistd',['/cowrie/cowrie-env/bin/twistd','-n','cowrie'])"]
    volumes:
      - ./config/cowrie.cfg:/tmp/cowrie.cfg.template:ro
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/var/lib/cowrie:/cowrie/cowrie-git/var/lib/cowrie

volumes:
  grafana-data:
