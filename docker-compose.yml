name: autopot

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/docker-entrypoint-custom.sh"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/entrypoint.sh:/docker-entrypoint-custom.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} psql -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' -q -t"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["psql"]
    command: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} -f /schema.sql"
    volumes:
      - ./postgres/schema.sql:/schema.sql:ro
    restart: "no"

  cowrie:
    build: ./cowrie
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    env_file: .env
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    volumes:
      - ./config/cowrie.cfg:/tmp/cowrie.cfg.template:ro
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/var/lib/cowrie:/cowrie/cowrie-git/var/lib/cowrie

  # Stats generator — runs on startup then every 5 minutes
  stats-gen:
    build:
      context: ./scripts
      dockerfile: Dockerfile.stats-gen
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-127.0.0.1}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - STATS_DIR=/stats
      - WORDLIST_DIR=/wordlists
    volumes:
      - ./scripts/generate-stats.py:/generate-stats.py:ro
      - ./scripts/stats-gen.sh:/stats-gen.sh:ro
      - stats:/stats
      - wordlists:/wordlists:ro
    entrypoint: ["/bin/sh", "/stats-gen.sh"]
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  # Bloom filter builder — runs once on startup, skips if filter already exists
  bloom-init:
    build:
      context: ./scripts
      dockerfile: Dockerfile.bloom-init
    restart: "no"
    network_mode: host
    environment:
      - BLOOM_DIR=/bloom
      # Space-separated URLs to download and build the filter from.
      # Override in .env to add WeakPass or other sources.
      - BLOOM_WORDLIST_URLS=${BLOOM_WORDLIST_URLS:-https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/xato-net-10-million-passwords-1000000.txt https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/100k-most-used-passwords-NCSC.txt}
    volumes:
      - ./scripts/build-bloom-filters.py:/build-bloom-filters.py:ro
      - ./scripts/bloom-init.sh:/bloom-init.sh:ro
      - bloom:/bloom
    entrypoint: ["/bin/sh", "/bloom-init.sh"]

  # Wordlist generator — runs on startup then every 6 hours via cron
  wordlist-gen:
    build:
      context: ./scripts
      dockerfile: Dockerfile.wordlist-gen
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-127.0.0.1}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - WORDLIST_DIR=/wordlists
      - BLOOM_DIR=/bloom
    volumes:
      - ./scripts/generate-wordlists.py:/generate-wordlists.py:ro
      - ./scripts/wordlist-gen.sh:/wordlist-gen.sh:ro
      - wordlists:/wordlists
      - bloom:/bloom
    entrypoint: ["/bin/sh", "/wordlist-gen.sh"]
    depends_on:
      bloom-init:
        condition: service_completed_successfully
      postgres-init:
        condition: service_completed_successfully

  # Web honeypot — fake NAS login page, logs HTTP visits and form submissions
  webhoneypot:
    build: ./webhoneypot
    container_name: webhoneypot
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-127.0.0.1}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      postgres-init:
        condition: service_completed_successfully

  # Stats dashboard — cowrie attack data from PostgreSQL, behind reCAPTCHA
  web:
    build: ./web
    container_name: web
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-127.0.0.1}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - WORDLIST_DIR=/wordlists
      - STATS_DIR=/stats
    volumes:
      - wordlists:/wordlists
      - stats:/stats
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx — routes port 80/443 by Host header
  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - TARGET_HOST=${TARGET_HOST}
    volumes:
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - webhoneypot

  # Certbot — automatic certificate renewal (runs every 12 h)
  certbot:
    image: certbot/certbot
    network_mode: host
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres-data:
  wordlists:
  stats:
  bloom:
