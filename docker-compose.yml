services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /mnt/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["psql"]
    command: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} -f /schema.sql"
    volumes:
      - ./postgres/schema.sql:/schema.sql:ro
    restart: "no"

  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    # Grafana listens on port 47321 (set via GF_SERVER_HTTP_PORT)
    env_file: .env
    environment:
      - GF_SERVER_HTTP_PORT=47321
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_WAL=true
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=7d
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=30d
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    entrypoint: ["/cowrie/cowrie-env/bin/python3", "-c", "import subprocess,os,sys; subprocess.run([sys.executable,'-m','pip','install','psycopg2-binary','-q']); os.execv('/cowrie/cowrie-env/bin/twistd',['/cowrie/cowrie-env/bin/twistd','-n','cowrie'])"]
    volumes:
      - ./config/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/var/lib/cowrie:/cowrie/cowrie-git/var/lib/cowrie

  wordlists:
    image: python:3.12-slim
    container_name: wordlists
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - POSTGRES_HOST=127.0.0.1
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - WORDLIST_DIR=/wordlists
    volumes:
      - ./scripts/generate-wordlists.py:/usr/local/bin/generate-wordlists.py:ro
      - ./wordlists:/wordlists
    # Run once at startup, then every day at 03:00 UTC via crond
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pip install psycopg2-binary -q
        python /usr/local/bin/generate-wordlists.py
        echo "0 3 * * * python /usr/local/bin/generate-wordlists.py >> /var/log/wordlists.log 2>&1" | crontab -
        crond -f -d 8

volumes:
  grafana-data:
