services:
  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host   # access host Postgres via localhost
    # Grafana listens on port 47321 (set via GF_SERVER_HTTP_PORT)
    env_file: .env
    environment:
      - GF_SERVER_HTTP_PORT=47321
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_WAL=true
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=7d
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=30d
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/cowrie/etc/cowrie.cfg:/home/cowrie/cowrie/etc/cowrie.cfg:ro
      - /mnt/cowrie/var/log/cowrie:/home/cowrie/cowrie/var/log/cowrie
      - /mnt/cowrie/var/lib/cowrie:/home/cowrie/cowrie/var/lib/cowrie

volumes:
  grafana-data:
