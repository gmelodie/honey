services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /mnt/postgres:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      - postgres
    # Grafana listens on port 47321 (set via GF_SERVER_HTTP_PORT)
    env_file: .env
    environment:
      - GF_SERVER_HTTP_PORT=47321
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_WAL=true
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=7d
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=30d
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  cowrie:
    build:
      context: .
      dockerfile: Dockerfile.cowrie
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./cowrie/etc/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/var/lib/cowrie:/cowrie/cowrie-git/var/lib/cowrie

volumes:
  grafana-data:
