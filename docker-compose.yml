services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /mnt/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-init:
    image: postgres:16
    network_mode: host
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["psql"]
    command: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} -f /schema.sql"
    volumes:
      - ./postgres/schema.sql:/schema.sql:ro
    restart: "no"

  grafana:
    image: grafana/grafana:11.5.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    # Grafana listens on port 47321 (set via GF_SERVER_HTTP_PORT)
    env_file: .env
    environment:
      - GF_SERVER_HTTP_PORT=47321
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DATABASE_WAL=true
      - GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION=7d
      - GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION=30d
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    entrypoint: ["/cowrie/cowrie-env/bin/python3", "-c", "import subprocess,os,sys; subprocess.run([sys.executable,'-m','pip','install','psycopg2-binary','-q']); os.execv('/cowrie/cowrie-env/bin/twistd',['/cowrie/cowrie-env/bin/twistd','-n','cowrie'])"]
    volumes:
      - ./config/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/var/log/cowrie:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/var/lib/cowrie:/cowrie/cowrie-git/var/lib/cowrie

  # Web honeypot — fake router admin panel served to unknown HTTP/HTTPS clients
  honeypot-web:
    build: ./honeypot-web
    container_name: honeypot-web
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./honeypot-web/logs:/var/log

  # Stats dashboard — cowrie attack data from PostgreSQL, behind reCAPTCHA
  web:
    build: ./web
    container_name: web
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-127.0.0.1}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx — routes port 80/443 by Host header
  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - TARGET_HOST=${TARGET_HOST}
    volumes:
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - honeypot-web

  # Certbot — automatic certificate renewal (runs every 12 h)
  certbot:
    image: certbot/certbot
    network_mode: host
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  grafana-data:
