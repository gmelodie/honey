<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexStore NAS — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      width: 340px;
      padding: 32px 28px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 20px; height: 20px; fill: #fff; }

    .logo-text { font-size: 1rem; font-weight: 600; color: #e6edf3; }
    .logo-version { font-size: .65rem; color: #6e7681; margin-left: 4px; }

    h1 {
      font-size: .875rem;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 22px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 14px;
    }

    label {
      display: block;
      font-size: .75rem;
      color: #8b949e;
      margin-bottom: 5px;
    }

    input[type=text], input[type=password] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 5px;
      color: #c9d1d9;
      font-size: .875rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 14px;
    }

    input[type=text]:focus, input[type=password]:focus {
      border-color: #388bfd;
      box-shadow: 0 0 0 2px rgba(56,139,253,.15);
    }

    .error-box {
      background: #2d1212;
      border: 1px solid #6e2121;
      border-radius: 5px;
      color: #f85149;
      font-size: .78rem;
      padding: 8px 10px;
      margin-bottom: 14px;
    }

    button[type=submit] {
      width: 100%;
      background: #1f6feb;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: .875rem;
      font-weight: 500;
      padding: 9px;
      cursor: pointer;
      transition: background .15s;
    }

    button[type=submit]:hover { background: #388bfd; }

    .footer-note {
      text-align: center;
      font-size: .68rem;
      color: #484f58;
      margin-top: 18px;
    }

    .status-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .status-text { font-size: .68rem; color: #3fb950; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M2 6a2 2 0 012-2h16a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm0 8a2 2 0 012-2h16a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2z"/></svg>
      </div>
      <div>
        <span class="logo-text">NexStore NAS</span>
        <span class="logo-version">v2.1.4</span>
      </div>
    </div>

    <div class="status-bar">
      <div class="dot"></div>
      <span class="status-text">System online</span>
    </div>

    <h1>Sign in to manage your device</h1>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username"/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>

      <button type="submit">Sign in</button>
    </form>

    <p class="footer-note">NexStore OS &nbsp;·&nbsp; Unauthorized access is prohibited</p>
  </div>
</body>
</html>
